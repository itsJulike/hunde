<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mød min hund - Marvin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>

    <div class="profile-card">
        <a class="back-link" href="../index.html" aria-label="Tilbage til hovedsiden">
            <i class="fas fa-arrow-left"></i>
            <span>Tilbage</span>
        </a>

        <div class="header-banner">
            <h2>Hej, jeg hedder</h2>
            <h1>FNUG</h1>
        </div>

        <img src="Fnug.JPEG" alt="Billede af hunden Fnug" class="avatar">

        <div class="content">
            <button class="status-badge" id="open-modal" type="button">
                <i class="fas fa-exclamation-circle"></i>
                Har du fundet mig alene?
            </button>

            <div class="info-section">
                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div class="info-content">
                        <div class="info-label">Adresse</div>
                        <a class="info-value address-link" href="https://www.google.com/maps/dir/?api=1&destination=Markusvej%2015%2C%208471%20Sabro" target="_blank" rel="noopener noreferrer" aria-label="Start navigation to the address">
                            Markusvej 15, 8471 Sabro
                        </a>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-dog"></i>
                    </div>
                    <div class="info-content">
                        <div class="info-label">Race</div>
                        <div class="info-value">Grand Danois</div>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-birthday-cake"></i>
                    </div>
                    <div class="info-content">
                        <div class="info-label">Alder</div>
                        <div class="info-value" id="age-value">Beregner alder...</div>
                    </div>
                </div>
            </div>

            <div class="contact-footer">
                <div class="contact-label">Ring til ejere</div>
                <div class="contact-buttons">
                    <a href="tel:+4529391418" class="cta-button contact-button">
                        <i class="fas fa-phone"></i>
                        <span>Julie</span>
                    </a>
                <a href="tel:+4525357439" class="cta-button contact-button">
                    <i class="fas fa-phone"></i>
                    <span>Rasmus</span>
                </a>
                </div>
            </div>

            </div>
        </div>
    </div>

    <div class="modal-overlay" id="info-modal" aria-hidden="true" onclick="if (event.target === this) closeModal()">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <button class="modal-close" id="close-modal" type="button" aria-label="Luk modal" onclick="closeModal()">×</button>
            <h3 id="modal-title">Har du fundet mig alene?</h3>
            <p>Jeg er smuttet på eventyr uden lov. Jeg er helt ufarlig, men min ejer savner mig rigtig meget!</p>
            <button class="modal-action" type="button" onclick="closeModal()">Luk</button>
        </div>
    </div>

    <script>
        const birthday = new Date('2025-09-17');
        const ageValue = document.getElementById('age-value');
        const modal = document.getElementById('info-modal');
        const openModalButton = document.getElementById('open-modal');
        const closeModalButton = document.getElementById('close-modal');
        const storageKey = 'fnug-info-modal-seen';

        function calculateAge(birthDate) {
            const today = new Date();
            let years = today.getFullYear() - birthDate.getFullYear();
            let months = today.getMonth() - birthDate.getMonth();

            if (months < 0 || (months === 0 && today.getDate() < birthDate.getDate())) {
                years--;
                months += 12;
            }

            if (months === 0 && today.getDate() < birthDate.getDate()) {
                months = 11;
            }

            if (years >= 3) {
                return `${years} år`;
            }

            const totalMonths = years * 12 + months;
            return `${totalMonths} måneder`;
        }

        if (ageValue) {
            ageValue.textContent = calculateAge(birthday);
        }

        function openModal() {
            modal.classList.add('is-open');
            modal.setAttribute('aria-hidden', 'false');
            modal.style.display = 'flex';
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            modal.classList.remove('is-open');
            modal.setAttribute('aria-hidden', 'true');
            modal.style.display = 'none';
            document.body.classList.remove('modal-open');
            localStorage.setItem(storageKey, 'true');
        }

        if (!localStorage.getItem(storageKey)) {
            openModal();
        }

        openModalButton?.addEventListener('click', openModal);
        closeModalButton?.addEventListener('click', (event) => {
            event.stopPropagation();
            closeModal();
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && modal.classList.contains('is-open')) {
                closeModal();
            }
        });
    </script>

</body>
</html>
