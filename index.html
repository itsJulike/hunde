<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine Hunde</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="landing-shell">
        <div class="profile-card landing-card">
            <div class="header-banner">
                <h2>Velkommen til</h2>
                <h1>MINE HUNDE</h1>
            </div>

            <div class="content">
                <div class="landing-intro">
                    <p>Her finder du mine tre bedste venner og deres profiler med adresse, vigtig information og kontaktoplysninger.</p>
                </div>

                <div class="dogs-grid">
                    <a href="Marvin/" class="dog-card-link">
                        <div class="dog-card">
                            <img src="Marvin/Marvin.jpg" alt="Marvin" class="avatar small-avatar">
                            <h3>Marvin</h3>
                            <p>Labrador Retriever</p>
                            <span class="dog-card-btn">Se profil</span>
                        </div>
                    </a>

                    <a href="Watson/" class="dog-card-link">
                        <div class="dog-card">
                            <img src="Watson/Watson.JPEG" alt="Watson" class="avatar small-avatar">
                            <h3>Watson</h3>
                            <p>Berner Sennen</p>
                            <span class="dog-card-btn">Se profil</span>

                        </div>
                    </a>
                    <a href="Fnug/" class="dog-card-link">
                        <div class="dog-card">
                            <img src="Fnug/Fnug.JPEG" alt="Fnug" class="avatar small-avatar">
                            <h3>Fnug</h3>
                            <p>Grand Danois</p>
                            <span class="dog-card-btn">Se profil</span>
                        </div>
                    </a>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
